<div style="padding: 20px; font-family: sans-serif;">
  <h1>Smart RTA Analyzer 🎛️</h1>
  <p>Control de Entrada de Audio e Infraestructura Base</p>
  
  <hr style="margin-bottom: 20px;">

  <div style="margin-bottom: 15px;">
    <label for="device-select" style="display: block; margin-bottom: 5px; font-weight: bold;">
      Selecciona la Mesa de Sonido o Micrófono:
    </label>
    <select 
      id="device-select" 
      (change)="onDeviceChange($event)"
      [disabled]="audioService.isListening()"
      style="padding: 8px; width: 100%; max-width: 400px; font-size: 14px;">
      
      <option value="">-- Dispositivo por defecto del sistema --</option>
      
      @for (device of audioService.audioDevices(); track device.deviceId) {
        <option [value]="device.deviceId">{{ device.label }}</option>
      }
    </select>
  </div>

<div style="display: flex; gap: 10px; margin-bottom: 20px;">
    
    <button 
      (click)="toggleListening()" 
      [style.background-color]="audioService.isListening() ? '#d9534f' : '#5cb85c'"
      style="color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 4px; font-weight: bold;">
      {{ audioService.isListening() ? '🛑 Detener Analizador' : '🎤 Iniciar Analizador' }}
    </button>

    <button 
      (click)="toggleFreeze()"
      [disabled]="!audioService.isListening()"
      [style.background-color]="isFrozen() ? '#f0ad4e' : '#0275d8'"
      [style.opacity]="!audioService.isListening() ? '0.5' : '1'"
      style="color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 4px; font-weight: bold;">
      {{ isFrozen() ? '▶ Reanudar (Espacio)' : '❄️ Congelar (Espacio)' }}
    </button>

  </div>

  <div style="margin-top: 20px; padding: 10px; border-radius: 4px;"
       [style.background-color]="audioService.isListening() ? '#eef7ee' : '#f9f9f9'">
    <strong>Estado del Motor:</strong> 
    <span [style.color]="audioService.isListening() ? 'green' : 'gray'">
      {{ audioService.isListening() ? 'ESCUCHANDO EN TIEMPO REAL (Filtros Pro Desactivados)' : 'APAGADO (Recursos Liberados)' }}
    </span>
  </div>

  <div style="margin-top: 30px; border: 2px solid #333; background-color: #111; border-radius: 6px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
    <canvas 
      #rtaCanvas 
      width="1024" 
      height="500" 
      style="display: block; width: 100%; max-width: 1000px; margin: 0 auto;">
    </canvas>
  </div>
</div>
